# yaml-language-server: $schema=https://raw.githubusercontent.com/jesseduffield/lazygit/master/schema/config.json

services:
  "gitlab.admin.ehealth.sundhed.dk": "gitlab:gitlab.admin.ehealth.sundhed.dk"

git:
  parseEmoji: true
  # Needed if you want to amend a signed commit and you are using an agent so you don't have to enter your passphrase again.
  overrideGpg: true

gui:
  nerdFontsVersion: "3"

  # https://github.com/catppuccin/lazygit/blob/main/themes/mocha/blue.yml
  theme:
    activeBorderColor:
      - "#89b4fa"
      - bold
    inactiveBorderColor:
      - "#a6adc8"
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - "#313244"
    cherryPickedCommitBgColor:
      - "#45475a"
    cherryPickedCommitFgColor:
      - "#89b4fa"
    unstagedChangesColor:
      - "#f38ba8"
    defaultFgColor:
      - "#cdd6f4"
    searchingActiveBorderColor:
      - "#f9e2af"

  authorColors:
    "*": "#b4befe"

customCommands:
  # https://gist.github.com/timhagel/28ae03354a85ce3e5237b308912b9b52
  - key: "C"
    command: 'git commit -m "{{ .Form.Type }}{{if .Form.Scope}}({{ .Form.Scope }}){{end}}: {{ .Form.Emoji }} {{ .Form.Description }}"'
    description: "conventional commit"
    context: "files"
    prompts:
      - type: "menu"
        title: "Select the type of change you are committing."
        key: "Type"
        options:
          - name: "Feature"
            description: "a new feature"
            value: "feat"
          - name: "Fix"
            description: "a bug fix"
            value: "fix"
          - name: "Documentation"
            description: "Documentation only changes"
            value: "docs"
          - name: "Styles"
            description: "Styling changes (white-space, formatting, etc)"
            value: "style"
          - name: "Code Refactoring"
            description: "Refactoring code"
            value: "refactor"
          - name: "Performance Improvements"
            description: "Performance improvements"
            value: "perf"
          - name: "Tests"
            description: "Test additions or fixes"
            value: "test"
          - name: "Builds"
            description: "Build system or dependency changes"
            value: "build"
          - name: "Continuous Integration"
            description: "CI configuration changes"
            value: "ci"
          - name: "Chores"
            description: "Other non-code changes"
            value: "chore"
          - name: "Reverts"
            description: "Reverting changes"
            value: "revert"
      - type: "menu"
        title: "Choose the emoji for this commit type."
        key: "Emoji"
        options:
          - name: "🎨 Improve structure / format of the code."
            value: ":art:"
          - name: "⚡️ Improve performance."
            value: ":zap:"
          - name: "🔥 Remove code or files."
            value: ":fire:"
          - name: "🐛 Fix a bug."
            value: ":bug:"
          - name: "🚑️ Critical hotfix."
            value: ":ambulance:"
          - name: "✨ Introduce new features."
            value: ":sparkles:"
          - name: "📝 Add or update documentation."
            value: ":memo:"
          - name: "🚀 Deploy stuff."
            value: ":rocket:"
          - name: "💄 Add or update the UI and style files."
            value: ":lipstick:"
          - name: "🎉 Begin a project."
            value: ":tada:"
          - name: "✅ Add, update, or pass tests."
            value: ":white_check_mark:"
          - name: "🔒️ Fix security or privacy issues."
            value: ":lock:"
          - name: "🔐 Add or update secrets."
            value: ":closed_lock_with_key:"
          - name: "🔖 Release / Version tags."
            value: ":bookmark:"
          - name: "🚨 Fix compiler / linter warnings."
            value: ":rotating_light:"
          - name: "🚧 Work in progress."
            value: ":construction:"
          - name: "💚 Fix CI Build."
            value: ":green_heart:"
          - name: "⬇️ Downgrade dependencies."
            value: ":arrow_down:"
          - name: "⬆️ Upgrade dependencies."
            value: ":arrow_up:"
          - name: "📌 Pin dependencies to specific versions."
            value: ":pushpin:"
          - name: "👷 Add or update CI build system."
            value: ":construction_worker:"
          - name: "📈 Add or update analytics or track code."
            value: ":chart_with_upwards_trend:"
          - name: "♻️ Refactor code."
            value: ":recycle:"
          - name: "➕ Add a dependency."
            value: ":heavy_plus_sign:"
          - name: "➖ Remove a dependency."
            value: ":heavy_minus_sign:"
          - name: "🔧 Add or update configuration files."
            value: ":wrench:"
          - name: "🔨 Add or update development scripts."
            value: ":hammer:"
          - name: "🌐 Internationalization and localization."
            value: ":globe_with_meridians:"
          - name: "✏️ Fix typos."
            value: ":pencil2:"
          - name: "💩 Write bad code that needs to be improved."
            value: ":poop:"
          - name: "⏪️ Revert changes."
            value: ":rewind:"
          - name: "🔀 Merge branches."
            value: ":twisted_rightwards_arrows:"
          - name: "📦️ Add or update compiled files or packages."
            value: ":package:"
          - name: "👽️ Update code due to external API changes."
            value: ":alien:"
          - name: "🚚 Move or rename resources (e.g.: files, paths, routes)."
            value: ":truck:"
          - name: "📄 Add or update license."
            value: ":page_facing_up:"
          - name: "💥 Introduce breaking changes."
            value: ":boom:"
          - name: "🍱 Add or update assets."
            value: ":bento:"
          - name: "♿️ Improve accessibility."
            value: ":wheelchair:"
          - name: "💡 Add or update comments in source code."
            value: ":bulb:"
          - name: "🍻 Write code drunkenly."
            value: ":beers:"
          - name: "💬 Add or update text and literals."
            value: ":speech_balloon:"
          - name: "🗃️ Perform database related changes."
            value: ":card_file_box:"
          - name: "🔊 Add or update logs."
            value: ":loud_sound:"
          - name: "🔇 Remove logs."
            value: ":mute:"
          - name: "👥 Add or update contributor(s)."
            value: ":busts_in_silhouette:"
          - name: "🚸 Improve user experience / usability."
            value: ":children_crossing:"
          - name: "🏗️ Make architectural changes."
            value: ":building_construction:"
          - name: "📱 Work on responsive design."
            value: ":iphone:"
          - name: "🤡 Mock things."
            value: ":clown_face:"
          - name: "🥚 Add or update an easter egg."
            value: ":egg:"
          - name: "🙈 Add or update a .gitignore file."
            value: ":see_no_evil:"
          - name: "📸 Add or update snapshots."
            value: ":camera_flash:"
          - name: "⚗️ Perform experiments."
            value: ":alembic:"
          - name: "🔍️ Improve SEO."
            value: ":mag:"
          - name: "🏷️ Add or update types."
            value: ":label:"
          - name: "🌱 Add or update seed files."
            value: ":seedling:"
          - name: "🚩 Add, update, or remove feature flags."
            value: ":triangular_flag_on_post:"
          - name: "🥅 Catch errors."
            value: ":goal_net:"
          - name: "💫 Add or update animations and transitions."
            value: ":dizzy:"
          - name: "🗑️ Deprecate code that needs to be cleaned up."
            value: ":wastebasket:"
          - name: "🛂 Work on code related to authorization, roles and permissions."
            value: ":passport_control:"
          - name: "🩹 Simple fix for a non-critical issue."
            value: ":adhesive_bandage:"
          - name: "🧐 Data exploration/inspection."
            value: ":monocle_face:"
          - name: "⚰️ Remove dead code."
            value: ":coffin:"
          - name: "🧪 Add a failing test."
            value: ":test_tube:"
          - name: "👔 Add or update business logic."
            value: ":necktie:"
          - name: "🩺 Add or update healthcheck."
            value: ":stethoscope:"
          - name: "🧱 Infrastructure related changes."
            value: ":bricks:"
      - type: "input"
        title: "Enter optional scope of the change."
        key: "Scope"
      - type: "input"
        title: "Enter the short description of the change."
        key: "Description"
      - type: "confirm"
        title: "Is the commit message correct?"
        body: "{{ .Form.Type }}{{if .Form.Scope}}({{ .Form.Scope }}){{end}}: {{ .Form.Emoji }} {{ .Form.Description }}"
